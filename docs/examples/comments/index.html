<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Comments Example — pokapali</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body { font-family: system-ui, sans-serif; }
      #root { display: flex; height: 100vh; }

      .editor-pane {
        flex: 1;
        padding: 2rem;
        overflow-y: auto;
      }
      .editor-pane .ProseMirror {
        min-height: 300px;
        padding: 1rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        outline: none;
      }

      /* Comment anchor highlights */
      .comment-anchor {
        background: rgba(255, 212, 0, 0.25);
        border-bottom: 2px solid rgba(255, 212, 0, 0.6);
        cursor: pointer;
      }
      .comment-anchor.active {
        background: rgba(255, 212, 0, 0.45);
      }
      .pending-anchor {
        background: rgba(100, 180, 255, 0.25);
        border-bottom: 2px solid rgba(100, 180, 255, 0.6);
      }

      /* Comments sidebar */
      .sidebar {
        width: 320px;
        border-left: 1px solid #ddd;
        padding: 1rem;
        overflow-y: auto;
        background: #fafafa;
      }
      .sidebar h2 { margin-bottom: 1rem; }

      .comment {
        margin-bottom: 1rem;
        padding: 0.75rem;
        background: white;
        border: 1px solid #eee;
        border-radius: 4px;
        font-size: 0.9rem;
      }
      .comment.active {
        border-color: rgba(255, 212, 0, 0.6);
      }
      .comment-meta {
        font-size: 0.75rem;
        color: #888;
        margin-bottom: 0.25rem;
      }
      .comment-actions {
        margin-top: 0.5rem;
        display: flex;
        gap: 0.5rem;
      }
      .comment-actions button {
        font-size: 0.75rem;
        cursor: pointer;
      }
      .reply {
        margin-left: 1rem;
        margin-top: 0.5rem;
      }

      .add-comment {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .add-comment input {
        flex: 1;
        padding: 0.4rem;
      }

      .status-bar {
        padding: 0.5rem 2rem;
        background: #f0f0f0;
        font-size: 0.8rem;
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
