name: Nightly Load Test (Tier 2)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration in seconds"
        required: false
        type: number
        default: 300
      docs:
        description: "Number of writer docs"
        required: false
        type: number
        default: 50
      readers:
        description: "Number of reader peers"
        required: false
        type: number
        default: 5

concurrency:
  group: load-nightly
  cancel-in-progress: false

env:
  LOADTEST_USER: root
  LOADTEST_REPO: /opt/pokapali
  # Output path is hardcoded in the remote script
  # to avoid quoting issues across SSH.

jobs:
  load-test:
    name: Tier 2 Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Pull latest on test VPS
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh -n "$LOADTEST_USER@$HOST" \
            bash -s -- "$LOADTEST_REPO" <<'REMOTE'
          set -euo pipefail
          REPO="$1"
          cd "$REPO"
          git fetch origin main
          git checkout origin/main
          npm ci
          npm run build
          echo "Ready at $(git rev-parse --short HEAD)"
          REMOTE

      - name: Start ephemeral test relay
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- "$LOADTEST_REPO" <<'REMOTE'
          set -euo pipefail
          REPO="$1"
          STORAGE="/tmp/pokapali-test-relay"

          # Clean previous run state
          rm -rf "$STORAGE"
          mkdir -p "$STORAGE"

          cd "$REPO"

          # Start relay+pinner in background
          node packages/node/dist/bin/node.js \
            --storage-path "$STORAGE" \
            --relay \
            --no-tls \
            --pin pokapali-load-test \
            --port 3000 \
            --log-level info \
            > /tmp/test-relay.log 2>&1 &

          RELAY_PID=$!
          echo "$RELAY_PID" > /tmp/test-relay.pid
          echo "Relay started (PID $RELAY_PID)"

          # Wait for health endpoint (up to 120s)
          for i in $(seq 1 24); do
            HEALTH=$(curl -sf -m 5 \
              http://localhost:3000/health 2>/dev/null \
              || true)
            if [ -n "$HEALTH" ]; then
              PEER_ID=$(echo "$HEALTH" \
                | node -e \
                  "process.stdin.setEncoding('utf8'); \
                   let d=''; \
                   process.stdin.on('data',c=>d+=c); \
                   process.stdin.on('end',()=> \
                     console.log( \
                       JSON.parse(d).peerId))")
              echo "$PEER_ID" \
                > /tmp/test-relay-peer-id
              echo "Relay healthy (peer $PEER_ID)"
              exit 0
            fi
            echo "  waiting... ($i/24)"
            sleep 5
          done

          echo "Relay failed to start"
          kill "$RELAY_PID" 2>/dev/null || true
          cat /tmp/test-relay.log
          exit 1
          REMOTE

      - name: Run load test
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
          DURATION: ${{ inputs.duration || 300 }}
          DOCS: ${{ inputs.docs || 50 }}
          READERS: ${{ inputs.readers || 5 }}
        run: |
          # Get relay peer ID for bootstrap addr
          PEER_ID=$(ssh -n "$LOADTEST_USER@$HOST" \
            "cat /tmp/test-relay-peer-id")

          BOOTSTRAP="/ip4/127.0.0.1/tcp/4001/p2p/$PEER_ID"
          echo "Bootstrap: $BOOTSTRAP"

          # shellcheck disable=SC2029
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- \
              "$LOADTEST_REPO" \
              "$DURATION" \
              "$DOCS" \
              "$READERS" \
              "$BOOTSTRAP" \
            <<'REMOTE'
          set -euo pipefail
          REPO="$1"
          DURATION="$2"
          DOCS="$3"
          READERS="$4"
          BOOTSTRAP="$5"
          OUTPUT="/tmp/load-nightly.jsonl"

          cd "$REPO"

          node packages/load-test/dist/bin/run.js \
            --docs "$DOCS" \
            --readers "$READERS" \
            --duration "$DURATION" \
            --interval 5000 \
            --edit-size 100 \
            --app-id pokapali-load-test \
            --output "$OUTPUT" \
            --bootstrap "$BOOTSTRAP"

          echo "Load test complete"
          REMOTE

      - name: Stop test relay
        if: always()
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s <<'REMOTE' || true
          if [ -f /tmp/test-relay.pid ]; then
            PID=$(cat /tmp/test-relay.pid)
            kill "$PID" 2>/dev/null || true
            # Wait for graceful shutdown
            for i in $(seq 1 10); do
              kill -0 "$PID" 2>/dev/null || break
              sleep 1
            done
            # Force kill if still running
            kill -9 "$PID" 2>/dev/null || true
            rm -f /tmp/test-relay.pid
            echo "Relay stopped (PID $PID)"
          fi
          rm -rf /tmp/pokapali-test-relay
          REMOTE

      - name: Download metrics
        if: always()
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          scp "$LOADTEST_USER@$HOST:/tmp/load-nightly.jsonl" \
            /tmp/load-nightly.jsonl \
            || echo "No metrics file to download"

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            load-nightly-${{ github.run_number }}
          path: /tmp/load-nightly.jsonl
          retention-days: 90

      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: 22
          cache: npm

      - name: Build analyzer
        if: always()
        run: |
          npm ci
          npm run build -w @pokapali/load-test

      - name: Analyze results
        if: always()
        run: |
          node packages/load-test/dist/bin/analyze.js \
            /tmp/load-nightly.jsonl \
            --max-errors 5 \
            --ack-rate 90
