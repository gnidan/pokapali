name: Nightly Load Test (Tier 2)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration in seconds"
        required: false
        type: number
        default: 300
      writers:
        description: "Number of writer docs"
        required: false
        type: number
        default: 50
      readers:
        description: "Number of reader peers"
        required: false
        type: number
        default: 5
      churn_interval:
        description: >-
          Churn cycle interval in ms
          (0 = no churn)
        required: false
        type: number
        default: 30000
      churn_size:
        description: >-
          Nodes to remove per churn cycle
        required: false
        type: number
        default: 2
      stabilize:
        description: >-
          Post-removal stabilization wait in ms
        required: false
        type: number
        default: 5000

permissions:
  contents: read
  issues: write

concurrency:
  group: load-nightly
  cancel-in-progress: false

env:
  LOADTEST_USER: root
  LOADTEST_REPO: /opt/pokapali

jobs:
  # --- Setup: pull latest, build, start relay ---

  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      peer-id: ${{ steps.relay.outputs.peer-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Pull latest
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh -n "$LOADTEST_USER@$HOST" \
            bash -s -- "$LOADTEST_REPO" <<'REMOTE'
          set -euo pipefail
          REPO="$1"
          cd "$REPO"
          git fetch origin main
          git checkout origin/main
          npm ci
          npm run build
          echo "Ready at $(git rev-parse --short HEAD)"
          REMOTE

      - name: Start ephemeral relay
        id: relay
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- "$LOADTEST_REPO" <<'REMOTE'
          set -euo pipefail
          REPO="$1"
          STORAGE="/tmp/pokapali-test-relay"

          # Clean previous run state
          rm -rf "$STORAGE"
          mkdir -p "$STORAGE"

          cd "$REPO"

          # Start relay+pinner in background
          node packages/node/dist/bin/node.js \
            --storage-path "$STORAGE" \
            --relay \
            --no-tls \
            --pin pokapali-load-test \
            --port 3000 \
            --log-level info \
            > /tmp/test-relay.log 2>&1 &

          RELAY_PID=$!
          echo "$RELAY_PID" > /tmp/test-relay.pid
          echo "Relay started (PID $RELAY_PID)"

          # Wait for health endpoint (up to 120s)
          for i in $(seq 1 24); do
            HEALTH=$(curl -sf -m 5 \
              http://localhost:3000/health \
              2>/dev/null || true)
            if [ -n "$HEALTH" ]; then
              echo "$HEALTH" | jq -r '.peerId' \
                > /tmp/test-relay-peer-id
              PEER_ID=$(cat /tmp/test-relay-peer-id)
              echo "Relay healthy (peer $PEER_ID)"
              exit 0
            fi
            echo "  waiting... ($i/24)"
            sleep 5
          done

          echo "Relay failed to start"
          kill "$RELAY_PID" 2>/dev/null || true
          cat /tmp/test-relay.log
          exit 1
          REMOTE

          # Read peer ID back for downstream jobs
          PEER_ID=$(ssh -n "$LOADTEST_USER@$HOST" \
            "cat /tmp/test-relay-peer-id")
          echo "peer-id=$PEER_ID" \
            >> "$GITHUB_OUTPUT"

  # --- Run load test ---

  load-test:
    name: Load Test
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Run load test
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
          DURATION: ${{ inputs.duration || 300 }}
          WRITERS: ${{ inputs.writers || 50 }}
          READERS: ${{ inputs.readers || 5 }}
          CHURN_INTERVAL: >-
            ${{ inputs.churn_interval || 30000 }}
          CHURN_SIZE: >-
            ${{ inputs.churn_size || 2 }}
          STABILIZE: >-
            ${{ inputs.stabilize || 5000 }}
          PEER_ID: >-
            ${{ needs.setup.outputs.peer-id }}
        run: |
          BOOTSTRAP="/ip4/127.0.0.1/tcp/4001/p2p/$PEER_ID"
          echo "Bootstrap: $BOOTSTRAP"
          echo "Churn: interval=${CHURN_INTERVAL}ms," \
            "size=${CHURN_SIZE}," \
            "stabilize=${STABILIZE}ms"

          # shellcheck disable=SC2029
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- \
              "$LOADTEST_REPO" \
              "$DURATION" \
              "$WRITERS" \
              "$READERS" \
              "$BOOTSTRAP" \
              "$CHURN_INTERVAL" \
              "$CHURN_SIZE" \
              "$STABILIZE" \
            <<'REMOTE'
          set -euo pipefail
          REPO="$1"
          DURATION="$2"
          WRITERS="$3"
          READERS="$4"
          BOOTSTRAP="$5"
          CHURN_INTERVAL="$6"
          CHURN_SIZE="$7"
          STABILIZE="$8"
          OUTPUT="/tmp/load-nightly.jsonl"

          cd "$REPO"

          node packages/load-test/dist/bin/churn.js \
            --writers "$WRITERS" \
            --readers "$READERS" \
            --duration "$DURATION" \
            --churn-interval "$CHURN_INTERVAL" \
            --churn-size "$CHURN_SIZE" \
            --stabilize "$STABILIZE" \
            --interval 5000 \
            --edit-size 100 \
            --app-id pokapali-load-test \
            --output "$OUTPUT" \
            --bootstrap "$BOOTSTRAP"

          echo "Load test complete"
          REMOTE

  # --- Cleanup: stop relay (always) ---

  stop-relay:
    name: Stop Relay
    needs: [setup, load-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Stop relay
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s <<'REMOTE' || true
          if [ -f /tmp/test-relay.pid ]; then
            PID=$(cat /tmp/test-relay.pid)
            kill "$PID" 2>/dev/null || true
            for i in $(seq 1 10); do
              kill -0 "$PID" 2>/dev/null || break
              sleep 1
            done
            kill -9 "$PID" 2>/dev/null || true
            rm -f /tmp/test-relay.pid
            echo "Relay stopped (PID $PID)"
          fi
          rm -rf /tmp/pokapali-test-relay
          REMOTE

  # --- Metrics: download + analyze ---

  metrics:
    name: Analyze Metrics
    needs: [setup, load-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Download metrics
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          scp \
            "$LOADTEST_USER@$HOST:/tmp/load-nightly.jsonl" \
            /tmp/load-nightly.jsonl \
            || echo "No metrics file to download"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: >-
            load-nightly-${{ github.run_number }}
          path: /tmp/load-nightly.jsonl
          retention-days: 90

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build analyzer
        run: |
          npm ci
          npm run build -w @pokapali/load-test

      - name: Analyze results
        run: |
          node packages/load-test/dist/bin/analyze.js \
            /tmp/load-nightly.jsonl \
            --max-errors 5 \
            --ack-rate 90 \
            --baseline \
              packages/load-test/baseline.json \
            --regression-tolerance 20 \
            --save-baseline \
              /tmp/load-nightly-baseline.json

      - name: Upload updated baseline
        uses: actions/upload-artifact@v4
        with:
          name: >-
            baseline-${{ github.run_number }}
          path: /tmp/load-nightly-baseline.json
          retention-days: 90

  notify-failure:
    name: Notify Failure
    needs: [setup, load-test, stop-relay, metrics]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: File or update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}
        run: |
          LABEL="load-nightly-failure"
          EXISTING=$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BODY_FILE=$(mktemp)

          if [ -n "$EXISTING" ]; then
            printf 'Still failing (%s):\n\n' \
              "$NOW" > "$BODY_FILE"
            printf '- Run: %s\n' \
              "$RUN_URL" >> "$BODY_FILE"
            gh issue comment "$EXISTING" \
              --body-file "$BODY_FILE"
          else
            {
              printf '%s\n\n' \
                "Nightly load test failed."
              printf '## Details\n\n'
              printf '- Run: %s\n' "$RUN_URL"
              printf '- Time: %s\n\n' "$NOW"
              printf '## Action needed\n\n'
              printf '%s\n' \
                "1. Check the run logs above"
              printf '%s\n' \
                "2. Fix and close this issue"
              printf '%s\n\n' \
                "3. Subsequent failures will" \
                "be added as comments."
            } > "$BODY_FILE"
            gh issue create \
              --title \
                "Nightly load test failed" \
              --label "$LABEL" \
              --body-file "$BODY_FILE"
          fi
          rm -f "$BODY_FILE"
