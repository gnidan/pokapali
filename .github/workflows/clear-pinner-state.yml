name: Clear Pinner State

on:
  workflow_dispatch:
    inputs:
      skip_nodes:
        description: >-
          Comma-separated pinner names to skip
          (e.g. "chi,bay")
        required: false
        type: string
        default: ""
      clear_blockstore:
        description: >-
          Also clear blockstore (orphaned blocks)
        required: false
        type: boolean
        default: false
      dry_run:
        description: >-
          Dry run (log what would be cleared)
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Serialize — never run concurrent clears
concurrency:
  group: clear-pinner-state
  cancel-in-progress: false

jobs:
  clear:
    name: Clear Pinners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        env:
          NODES_JSON: >-
            ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Clear pinner state
        run: |
          bin/clear-all-pinners.sh \
            "${{ inputs.skip_nodes }}" \
            "${{ inputs.clear_blockstore }}" \
            "${{ inputs.dry_run }}"
