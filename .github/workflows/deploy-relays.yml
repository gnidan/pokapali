name: Deploy Relays

on:
  workflow_dispatch:
    inputs:
      commit:
        description: >-
          Target commit SHA (default: latest main)
        required: false
        type: string
        default: ""
      skip_nodes:
        description: >-
          Comma-separated node names to skip
          (e.g. "chi,nyc")
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (log commands, don't execute)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-relays
  cancel-in-progress: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.target.outputs.commit }}
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        run: |
          echo "${{ secrets.DEPLOY_NODES_CONFIG }}" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Resolve target commit
        id: target
        run: |
          COMMIT="${{ inputs.commit }}"
          if [ -z "$COMMIT" ]; then
            COMMIT=$(git rev-parse origin/main)
          fi
          if ! git merge-base --is-ancestor \
            "$COMMIT" origin/main 2>/dev/null; then
            echo "::error::Commit $COMMIT is not" \
              "on main branch"
            exit 1
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Target commit: ${COMMIT:0:7}"

      - name: Preflight
        env:
          SKIP: ${{ inputs.skip_nodes }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          CONFIG="deploy/nodes.json"
          COMMIT="${{ steps.target.outputs.commit }}"
          USER=$(jq -r '.defaults.user' "$CONFIG")
          REPO_PATH=$(jq -r \
            '.defaults.repo_path' "$CONFIG")
          BATCHES=$(jq '.batches | length' "$CONFIG")

          echo "=== Deploy Plan ==="
          echo "Commit: ${COMMIT:0:7}"
          echo "Batches: $BATCHES"
          echo "Skip: ${SKIP:-none}"
          echo "Dry run: $DRY_RUN"
          echo ""

          echo "=== Current Node State ==="
          if [ "$DRY_RUN" = "true" ]; then
            echo "  [DRY RUN] Skipping SSH preflight"
          else
            IFS=',' read -ra SKIP_ARR <<< "${SKIP:-}"
            ALL_NODES=$(jq -r \
              '.batches[].nodes[].name' "$CONFIG")
            for NODE_NAME in $ALL_NODES; do
              SKIPPED=false
              for s in "${SKIP_ARR[@]}"; do
                s=$(echo "$s" | xargs)
                if [ "$s" = "$NODE_NAME" ]; then
                  SKIPPED=true
                fi
              done
              if [ "$SKIPPED" = "true" ]; then
                continue
              fi
              HOST=$(jq -r \
                ".batches[].nodes[] |
                 select(.name==\"$NODE_NAME\") |
                 .host" "$CONFIG")
              # shellcheck disable=SC2029
              CUR=$(ssh "$USER@$HOST" \
                "cd $REPO_PATH && git rev-parse HEAD" \
                2>/dev/null || echo "unreachable")
              echo "  $NODE_NAME ($HOST): ${CUR:0:7}"
            done
          fi

  batch-1:
    name: "Batch 1: chi + de"
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        run: |
          echo "${{ secrets.DEPLOY_NODES_CONFIG }}" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy + health check
        run: |
          bin/deploy-batch.sh 0 \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.skip_nodes }}" \
            "${{ inputs.dry_run }}"

  batch-2:
    name: "Batch 2: nyc + ams"
    needs: [setup, batch-1]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        run: |
          echo "${{ secrets.DEPLOY_NODES_CONFIG }}" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy + health check
        run: |
          bin/deploy-batch.sh 1 \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.skip_nodes }}" \
            "${{ inputs.dry_run }}"

  batch-3:
    name: "Batch 3: atl + bay"
    needs: [setup, batch-2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        run: |
          echo "${{ secrets.DEPLOY_NODES_CONFIG }}" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy + health check
        run: |
          bin/deploy-batch.sh 2 \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.skip_nodes }}" \
            "${{ inputs.dry_run }}"

  batch-4:
    name: "Batch 4: yto"
    needs: [setup, batch-3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        run: |
          echo "${{ secrets.DEPLOY_NODES_CONFIG }}" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy + health check
        run: |
          bin/deploy-batch.sh 3 \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.skip_nodes }}" \
            "${{ inputs.dry_run }}"
