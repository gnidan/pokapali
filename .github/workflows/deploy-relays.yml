name: Deploy Relays

on:
  workflow_dispatch:
    inputs:
      commit:
        description: >-
          Target commit SHA (default: latest main)
        required: false
        type: string
        default: ""
      skip_nodes:
        description: >-
          Comma-separated node names to skip
          (e.g. "chi,nyc")
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (log commands, don't execute)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-relays
  cancel-in-progress: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.target.outputs.commit }}
    steps:
      - uses: actions/checkout@v4

      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Resolve target commit
        id: target
        run: |
          COMMIT="${{ inputs.commit }}"
          if [ -z "$COMMIT" ]; then
            COMMIT=$(git rev-parse origin/main)
          fi
          if ! git merge-base --is-ancestor \
            "$COMMIT" origin/main 2>/dev/null; then
            echo "::error::Commit $COMMIT is not" \
              "on main branch"
            exit 1
          fi
          # Resolve to full SHA for health check
          COMMIT=$(git rev-parse "$COMMIT")
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Target commit: ${COMMIT:0:7}"

      - name: Preflight
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # shellcheck disable=SC2029
          set -euo pipefail
          CONFIG="deploy/nodes.json"
          COMMIT="${{ steps.target.outputs.commit }}"
          USER=$(jq -r '.defaults.user' "$CONFIG")
          REPO=$(jq -r '.defaults.repo_path' "$CONFIG")

          echo "=== Deploy Plan ==="
          echo "Commit: ${COMMIT:0:7}"
          echo "Skip: ${{ inputs.skip_nodes || 'none' }}"
          echo "Dry run: $DRY_RUN"
          echo ""

          echo "=== Current Node State ==="
          if [ "$DRY_RUN" = "true" ]; then
            echo "  [DRY RUN] Skipping preflight"
          else
            NODES=$(jq -r \
              '.batches[].nodes[] |
               "\(.name) \(.host)"' "$CONFIG")
            while IFS=' ' read -r NAME HOST; do
              # shellcheck disable=SC2029
              CUR=$(ssh -n "$USER@$HOST" \
                "cd $REPO && git rev-parse HEAD" \
                2>/dev/null || echo "unreachable")
              echo "  $NAME ($HOST): ${CUR:0:7}"
            done <<< "$NODES"
          fi

  # --- Batch 1: chi + de (parallel) ---

  chi:
    name: "chi"
    needs: setup
    if: >-
      !contains(inputs.skip_nodes, 'chi')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh chi \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"

  de:
    name: "de"
    needs: setup
    if: >-
      !contains(inputs.skip_nodes, 'de')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh de \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"

  # --- Batch 2: nyc + ams (after batch 1) ---

  nyc:
    name: "nyc"
    needs: [setup, chi, de]
    if: >-
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      !contains(inputs.skip_nodes, 'nyc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh nyc \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"

  ams:
    name: "ams"
    needs: [setup, chi, de]
    if: >-
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      !contains(inputs.skip_nodes, 'ams')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh ams \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"

  # --- Batch 3: atl + bay + yto (after batch 2) ---

  atl:
    name: "atl"
    needs: [setup, nyc, ams]
    if: >-
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      !contains(inputs.skip_nodes, 'atl')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh atl \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"

  bay:
    name: "bay"
    needs: [setup, nyc, ams]
    if: >-
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      !contains(inputs.skip_nodes, 'bay')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh bay \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"

  # --- Batch 3 also: yto (parallel with atl + bay) ---

  yto:
    name: "yto"
    needs: [setup, nyc, ams]
    if: >-
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      !contains(inputs.skip_nodes, 'yto')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write node config
        env:
          NODES_JSON: ${{ secrets.DEPLOY_NODES_CONFIG }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$NODES_JSON" \
            > deploy/nodes.json
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
      - name: Deploy + health check
        run: |
          bin/deploy-single-node.sh yto \
            "${{ needs.setup.outputs.commit }}" \
            "${{ inputs.dry_run }}"
