name: Deploy Relays

on:
  workflow_dispatch:
    inputs:
      commit:
        description: >-
          Target commit SHA (default: latest main)
        required: false
        type: string
        default: ""
      skip_nodes:
        description: >-
          Comma-separated node names to skip
          (e.g. "chi,nyc")
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (log commands, don't execute)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-relays
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
          cat ~/.ssh/config

      - name: Resolve target commit
        id: target
        run: |
          COMMIT="${{ inputs.commit }}"
          if [ -z "$COMMIT" ]; then
            COMMIT=$(git rev-parse origin/main)
          fi
          # Verify commit exists on main
          if ! git merge-base --is-ancestor \
            "$COMMIT" origin/main 2>/dev/null; then
            echo "::error::Commit $COMMIT is not" \
              "on main branch"
            exit 1
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Target commit: ${COMMIT:0:7}"

      - name: Rolling deploy
        env:
          TARGET: ${{ steps.target.outputs.commit }}
          SKIP: ${{ inputs.skip_nodes }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          CONFIG="deploy/nodes.json"
          COMMIT="$TARGET"

          # Read defaults from config
          USER=$(jq -r '.defaults.user' "$CONFIG")
          REPO_PATH=$(jq -r '.defaults.repo_path' "$CONFIG")
          SERVICE=$(jq -r '.defaults.service' "$CONFIG")
          PORT=$(jq -r '.defaults.health_port' "$CONFIG")
          TIMEOUT=$(jq -r '.defaults.health_timeout' "$CONFIG")
          RETRIES=$(jq -r '.defaults.health_retries' "$CONFIG")
          RETRY_DELAY=$(jq -r \
            '.defaults.health_retry_delay' "$CONFIG")
          STARTUP_WAIT=$(jq -r \
            '.defaults.startup_wait' "$CONFIG")

          # Parse skip list into array
          IFS=',' read -ra SKIP_ARR <<< "${SKIP:-}"

          should_skip() {
            local name="$1"
            for s in "${SKIP_ARR[@]}"; do
              s=$(echo "$s" | xargs)  # trim whitespace
              if [ "$s" = "$name" ]; then
                return 0
              fi
            done
            return 1
          }

          BATCH_COUNT=$(jq '.batches | length' "$CONFIG")
          DEPLOYED=()
          SKIPPED=()

          echo "=== Deploy Plan ==="
          echo "Commit: ${COMMIT:0:7}"
          echo "Batches: $BATCH_COUNT"
          echo "Skip: ${SKIP:-none}"
          echo "Dry run: $DRY_RUN"
          echo ""

          # --- Preflight: capture current state ---
          echo "=== Preflight: Current Node State ==="
          if [ "$DRY_RUN" = "true" ]; then
            echo "  [DRY RUN] Skipping SSH preflight"
          else
            ALL_NODES=$(jq -r \
              '.batches[].nodes[].name' "$CONFIG")
            for NODE_NAME in $ALL_NODES; do
              if should_skip "$NODE_NAME"; then
                continue
              fi
              HOST=$(jq -r \
                ".batches[].nodes[] |
                 select(.name==\"$NODE_NAME\") |
                 .host" "$CONFIG")
              CURRENT=$(ssh "$USER@$HOST" \
                "cd $REPO_PATH && git rev-parse HEAD" \
                2>/dev/null || echo "unreachable")
              echo "  $NODE_NAME ($HOST):" \
                "${CURRENT:0:7}"
            done
          fi
          echo ""

          # --- Rolling deploy ---
          for ((b=0; b<BATCH_COUNT; b++)); do
            BATCH_NAME=$(jq -r \
              ".batches[$b].name" "$CONFIG")
            NODE_COUNT=$(jq \
              ".batches[$b].nodes | length" "$CONFIG")

            echo "=== $BATCH_NAME ==="

            # Collect nodes for this batch
            BATCH_NODES=()
            BATCH_HOSTS=()
            for ((n=0; n<NODE_COUNT; n++)); do
              NAME=$(jq -r \
                ".batches[$b].nodes[$n].name" "$CONFIG")
              HOST=$(jq -r \
                ".batches[$b].nodes[$n].host" "$CONFIG")

              if should_skip "$NAME"; then
                echo "  Skipping $NAME"
                SKIPPED+=("$NAME")
                continue
              fi

              BATCH_NODES+=("$NAME")
              BATCH_HOSTS+=("$HOST")
            done

            if [ ${#BATCH_NODES[@]} -eq 0 ]; then
              echo "  All nodes skipped, continuing."
              continue
            fi

            # Deploy nodes in parallel
            PIDS=()
            for i in "${!BATCH_NODES[@]}"; do
              NAME="${BATCH_NODES[$i]}"
              HOST="${BATCH_HOSTS[$i]}"

              if [ "$DRY_RUN" = "true" ]; then
                echo "  [DRY RUN] Would deploy" \
                  "$NAME ($HOST)"
              else
                bin/deploy-node.sh "$USER" "$HOST" \
                  "$REPO_PATH" "$SERVICE" "$COMMIT" &
                PIDS+=($!)
              fi
            done

            # Wait for all deploys in batch
            DEPLOY_FAILED=false
            if [ ${#PIDS[@]} -gt 0 ]; then
              for pid in "${PIDS[@]}"; do
                if ! wait "$pid"; then
                  DEPLOY_FAILED=true
                fi
              done
            fi

            if [ "$DEPLOY_FAILED" = "true" ]; then
              echo "::error::Deploy failed in" \
                "$BATCH_NAME"
              exit 1
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Would wait" \
                "${STARTUP_WAIT}s"
              for i in "${!BATCH_NODES[@]}"; do
                echo "  [DRY RUN] Would health-check" \
                  "${BATCH_NODES[$i]}"
                DEPLOYED+=("${BATCH_NODES[$i]}")
              done
              echo ""
              continue
            fi

            # Wait for startup
            echo "  Waiting ${STARTUP_WAIT}s for" \
              "startup..."
            sleep "$STARTUP_WAIT"

            # Health check nodes in parallel
            PIDS=()
            for i in "${!BATCH_NODES[@]}"; do
              NAME="${BATCH_NODES[$i]}"
              HOST="${BATCH_HOSTS[$i]}"

              bin/health-check.sh "$USER" "$HOST" \
                "$REPO_PATH" "$SERVICE" "$COMMIT" \
                "$PORT" "$TIMEOUT" "$RETRIES" \
                "$RETRY_DELAY" &
              PIDS+=($!)
            done

            HEALTH_FAILED=false
            for pid in "${PIDS[@]}"; do
              if ! wait "$pid"; then
                HEALTH_FAILED=true
              fi
            done

            if [ "$HEALTH_FAILED" = "true" ]; then
              echo ""
              echo "::error::Health check failed in" \
                "$BATCH_NAME. Stopping deploy."
              echo ""
              echo "=== Deploy Aborted ==="
              echo "Deployed OK:" \
                "${DEPLOYED[*]:-none}"
              echo "Failed batch: $BATCH_NAME" \
                "(${BATCH_NODES[*]})"
              echo "Not yet deployed:" \
                "remaining batches"
              echo ""
              echo "To rollback, re-run with the" \
                "previous commit SHA."
              exit 1
            fi

            for NAME in "${BATCH_NODES[@]}"; do
              DEPLOYED+=("$NAME")
            done
            echo "  $BATCH_NAME complete." \
              "All nodes healthy."
            echo ""
          done

          # --- Summary ---
          echo "=== Deploy Complete ==="
          echo "Commit: ${COMMIT:0:7}"
          echo "Deployed: ${DEPLOYED[*]:-none}"
          echo "Skipped: ${SKIPPED[*]:-none}"
