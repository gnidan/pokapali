name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/dist
            apps/*/dist
          key: build-${{ github.sha }}

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            apps/*/dist
          key: build-${{ github.sha }}
      - run: npm test

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            apps/*/dist
          key: build-${{ github.sha }}
      - run: npm run lint

  format:
    name: Format
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            apps/*/dist
          key: build-${{ github.sha }}
      - run: npm run format:check

  changeset-check:
    name: Changeset Check
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            apps/*/dist
          key: build-${{ github.sha }}
      - name: Require changeset for package changes
        run: npx changeset status --since=origin/main
      - name: Require changeset file in PR
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          FILES=$(git diff --name-only "$BASE"..HEAD \
            -- '.changeset/*.md' \
            | grep -v README.md || true)
          if [ -z "$FILES" ]; then
            echo "No changeset file found in this PR."
            echo "Run: npx changeset"
            echo ""
            echo "For non-package changes, use empty"
            echo "frontmatter with a description."
            exit 1
          fi
          echo "Changeset file(s) found:"
          echo "$FILES"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck bin/*.sh

  actionlint:
    name: ActionLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -s \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - run: ./actionlint
