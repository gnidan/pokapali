name: Load Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: load-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke test
        run: >
          node packages/load-test/dist/bin/smoke.js
          --output /tmp/load-smoke.jsonl

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-smoke-metrics
          path: /tmp/load-smoke.jsonl
          retention-days: 90

  notify-failure:
    name: Notify Failure
    needs: smoke
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: File or update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}
        run: |
          LABEL="load-smoke-failure"
          EXISTING=$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BODY_FILE=$(mktemp)

          if [ -n "$EXISTING" ]; then
            printf 'Still failing (%s):\n\n' \
              "$NOW" > "$BODY_FILE"
            printf '- Run: %s\n' \
              "$RUN_URL" >> "$BODY_FILE"
            gh issue comment "$EXISTING" \
              --body-file "$BODY_FILE"
          else
            {
              printf '%s\n\n' \
                "Load smoke test failed."
              printf '## Details\n\n'
              printf '- Run: %s\n' "$RUN_URL"
              printf '- Time: %s\n\n' "$NOW"
              printf '## Action needed\n\n'
              printf '%s\n' \
                "1. Check the run logs above"
              printf '%s\n' \
                "2. Fix and close this issue"
              printf '%s\n\n' \
                "3. Subsequent failures will" \
                "be added as comments."
            } > "$BODY_FILE"
            gh issue create \
              --title "Load smoke test failed" \
              --label "$LABEL" \
              --body-file "$BODY_FILE"
          fi
          rm -f "$BODY_FILE"
