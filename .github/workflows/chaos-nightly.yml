name: Nightly Chaos Tests (Tier 3)

on:
  schedule:
    - cron: "0 4 * * *" # Daily at 4am UTC
  workflow_dispatch:
    inputs:
      scenario:
        description: >-
          Scenario to run (s1, s3, s4, or all)
        required: false
        type: string
        default: "all"
      writers:
        description: "Number of writers"
        required: false
        type: number
        default: 20
      baseline:
        description: "Baseline duration (seconds)"
        required: false
        type: number
        default: 60
      readers:
        description: "Number of readers"
        required: false
        type: number
        default: 3

permissions:
  contents: read
  issues: write

concurrency:
  group: chaos-nightly
  cancel-in-progress: false

env:
  LOADTEST_USER: root
  LOADTEST_REPO: /opt/pokapali

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Pull and build
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh -n "$LOADTEST_USER@$HOST" \
            bash -s -- "$LOADTEST_REPO" <<'REMOTE'
          set -euo pipefail
          cd "$1"
          git fetch origin main
          git checkout origin/main
          npm ci
          npm run build
          echo "Ready at $(git rev-parse --short HEAD)"
          REMOTE

  s1-relay-kill:
    name: "S1: Relay Kill"
    needs: setup
    if: >-
      github.event_name == 'schedule' ||
      inputs.scenario == 'all' ||
      inputs.scenario == 's1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Run S1
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
          WRITERS: ${{ inputs.writers || 20 }}
          BASELINE: ${{ inputs.baseline || 60 }}
          READERS: ${{ inputs.readers || 3 }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- \
              "$LOADTEST_REPO" \
              "$WRITERS" \
              "$BASELINE" \
              "$READERS" \
            <<'REMOTE'
          set -euo pipefail
          cd "$1"
          packages/load-test/bin/chaos-s1.sh \
            --writers "$2" \
            --baseline "$3" \
            --readers "$4" \
            --output /tmp/chaos-s1
          REMOTE

      - name: Download results
        if: always()
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          mkdir -p /tmp/results
          scp "$LOADTEST_USER@$HOST:/tmp/chaos-s1/*" \
            /tmp/results/ || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-s1-${{ github.run_number }}
          path: /tmp/results/
          retention-days: 90

  s4-peer-churn:
    name: "S4: Peer Churn"
    needs: [setup, s1-relay-kill]
    if: >-
      always() && (
        github.event_name == 'schedule' ||
        inputs.scenario == 'all' ||
        inputs.scenario == 's4'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Run S4
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
          WRITERS: ${{ inputs.writers || 10 }}
          BASELINE: ${{ inputs.baseline || 60 }}
          READERS: ${{ inputs.readers || 2 }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- \
              "$LOADTEST_REPO" \
              "$WRITERS" \
              "$BASELINE" \
              "$READERS" \
            <<'REMOTE'
          set -euo pipefail
          cd "$1"
          packages/load-test/bin/chaos-s4.sh \
            --writers "$2" \
            --baseline "$3" \
            --readers "$4" \
            --output /tmp/chaos-s4
          REMOTE

      - name: Download results
        if: always()
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          mkdir -p /tmp/results
          scp "$LOADTEST_USER@$HOST:/tmp/chaos-s4/*" \
            /tmp/results/ || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-s4-${{ github.run_number }}
          path: /tmp/results/
          retention-days: 90

  s3-name-flood:
    name: "S3: New-Name Flood"
    needs: [setup, s4-peer-churn]
    if: >-
      always() && (
        github.event_name == 'schedule' ||
        inputs.scenario == 'all' ||
        inputs.scenario == 's3'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Run S3
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
          WRITERS: ${{ inputs.writers || 5 }}
          BASELINE: ${{ inputs.baseline || 60 }}
          READERS: ${{ inputs.readers || 2 }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- \
              "$LOADTEST_REPO" \
              "$WRITERS" \
              "$BASELINE" \
              "$READERS" \
            <<'REMOTE'
          set -euo pipefail
          cd "$1"
          packages/load-test/bin/chaos-s3.sh \
            --writers "$2" \
            --baseline "$3" \
            --readers "$4" \
            --output /tmp/chaos-s3
          REMOTE

      - name: Download results
        if: always()
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          mkdir -p /tmp/results
          scp "$LOADTEST_USER@$HOST:/tmp/chaos-s3/*" \
            /tmp/results/ || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-s3-${{ github.run_number }}
          path: /tmp/results/
          retention-days: 90

  cleanup:
    name: Cleanup
    needs: [s1-relay-kill, s4-peer-churn, s3-name-flood]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_SSH_KEY }}" \
            > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo \
            "${{ secrets.LOADTEST_SSH_KNOWN_HOSTS }}" \
            > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host *" \
            "  IdentityFile ~/.ssh/deploy-key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Stop fleet
        env:
          HOST: ${{ secrets.LOADTEST_SSH_HOST }}
        run: |
          ssh "$LOADTEST_USER@$HOST" \
            bash -s -- "$LOADTEST_REPO" <<'REMOTE'
          set -euo pipefail
          cd "$1"
          packages/load-test/bin/chaos-fleet.sh \
            stop || true
          REMOTE

  notify-failure:
    name: Notify Failure
    needs:
      - s1-relay-kill
      - s4-peer-churn
      - s3-name-flood
      - cleanup
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: File or update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}
        run: |
          LABEL="chaos-test-failure"
          EXISTING=$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BODY_FILE=$(mktemp)

          if [ -n "$EXISTING" ]; then
            printf 'Still failing (%s):\n\n' \
              "$NOW" > "$BODY_FILE"
            printf '- Run: %s\n' \
              "$RUN_URL" >> "$BODY_FILE"
            gh issue comment "$EXISTING" \
              --body-file "$BODY_FILE"
          else
            {
              printf '%s\n\n' \
                "Chaos test failed."
              printf '## Details\n\n'
              printf '- Run: %s\n' "$RUN_URL"
              printf '- Time: %s\n\n' "$NOW"
              printf '## Action needed\n\n'
              printf '%s\n' \
                "1. Check the run logs above"
              printf '%s\n' \
                "2. Fix and close this issue"
              printf '%s\n\n' \
                "3. Subsequent failures will" \
                "be added as comments."
            } > "$BODY_FILE"
            gh issue create \
              --title "Chaos test failed" \
              --label "$LABEL" \
              --body-file "$BODY_FILE"
          fi
          rm -f "$BODY_FILE"
