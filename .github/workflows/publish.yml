name: Publish

on:
  push:
    tags: ["**"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/@pokapali/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Tag format: @pokapali/<name>@<version>
          PKG="${TAG%@[0-9]*}"
          VERSION="${TAG##*@}"
          DIR="${PKG#@pokapali/}"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Publishing $PKG@$VERSION from packages/$DIR"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify version
        run: |
          ACTUAL=$(node -p "require('./packages/${{ steps.tag.outputs.dir }}/package.json').version")
          if [ "$ACTUAL" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Version mismatch: package.json=$ACTUAL tag=${{ steps.tag.outputs.version }}"
            exit 1
          fi

      - name: Publish
        run: npm publish -w packages/${{ steps.tag.outputs.dir }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
