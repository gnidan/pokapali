name: Publish

on:
  push:
    branches: [main, "release/**"]
    paths: ["packages/*/package.json"]
  workflow_dispatch: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish packages
        id: publish
        run: |
          OUTPUT=$(npx changeset publish 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"

          # Extract published packages for verification
          # changeset publish prefixes lines with 🦋
          PUBLISHED=$(echo "$OUTPUT" \
            | grep "New tag: " \
            | sed 's/.*New tag:  *//' \
            || true)

          if [ -z "$PUBLISHED" ]; then
            echo "No packages to publish"
            echo "published=none" >> "$GITHUB_OUTPUT"
          else
            echo "published=yes" >> "$GITHUB_OUTPUT"
            # Save list for verification step
            echo "$PUBLISHED" > /tmp/published.txt
            cat /tmp/published.txt
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages
        if: steps.publish.outputs.published == 'yes'
        run: |
          FAIL=0
          while IFS= read -r tag; do
            # tag format: @pokapali/name@version
            # Last @ separates package from version
            VER="${tag##*@}"
            PKG="${tag%@"$VER"}"

            echo "Verifying $PKG@$VER ..."

            # Poll npm for up to 2 minutes
            FOUND=0
            for i in $(seq 1 12); do
              ACTUAL=$(npm view "$PKG" version \
                2>/dev/null || true)
              if [ "$ACTUAL" = "$VER" ]; then
                FOUND=1
                break
              fi
              echo "  attempt $i: got '$ACTUAL'," \
                "want '$VER'"
              sleep 10
            done

            if [ "$FOUND" -ne 1 ]; then
              echo "FAIL: $PKG@$VER not found on npm"
              FAIL=1
              continue
            fi

            # Verify dist-tag
            TAGS=$(npm view "$PKG" dist-tags \
              --json 2>/dev/null || echo "{}")
            case "$VER" in
              *-next.*)
                EXPECTED_TAG="next" ;;
              *-*)
                EXPECTED_TAG="next" ;;
              *)
                EXPECTED_TAG="latest" ;;
            esac

            TAG_VER=$(echo "$TAGS" \
              | node -e "
                const d = require('fs')
                  .readFileSync(0,'utf8');
                const t = JSON.parse(d);
                console.log(t['$EXPECTED_TAG']||'')
              ")

            if [ "$TAG_VER" = "$VER" ]; then
              echo "  OK: $PKG@$VER ($EXPECTED_TAG)"
            else
              echo "  FAIL: $PKG@$VER expected" \
                "dist-tag '$EXPECTED_TAG' but got" \
                "'$TAG_VER'"
              FAIL=1
            fi
          done < /tmp/published.txt

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Post-publish verification failed"
            exit 1
          fi
          echo ""
          echo "All packages verified"

      - name: Push per-package tags
        if: steps.publish.outputs.published == 'yes'
        run: git push --follow-tags
