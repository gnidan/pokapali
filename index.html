<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokapali Example</title>
    <script>
      // Handle SPA redirect from 404.html
      (function () {
        var q = new URLSearchParams(location.search);
        var p = q.get("p");
        if (p) {
          q.delete("p");
          var qs = q.toString();
          history.replaceState(
            null,
            "",
            p + (qs ? "?" + qs : "")
          );
        }
      })();
    </script>
    <script type="module" crossorigin src="/pokapali/assets/index-Cr6lVP-r.js"></script>

  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
